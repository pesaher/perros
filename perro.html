<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perro 🐾</title>
    <link rel="icon" type="image/png" href="archivos/iconos/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="archivos/iconos/favicon.svg" />
    <link rel="shortcut icon" href="archivos/iconos/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="archivos/iconos/apple-touch-icon.png" />
    <link rel="manifest" href="archivos/iconos/site.webmanifest" />
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.7"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/perro.css">
</head>
<body>
    <div class="contenedor-perro">
        <div id="contenido-perro">
            <!-- Aquí se cargarán los datos dinámicamente -->
        </div>

        <div class="botones-inferiores" id="botonesInferiores">
            <a href="javascript:history.back()" class="boton boton-volver">← Volver a Cheniles</a>
            <button class="boton boton-editar boton-admin" id="btnEditar">✏️ Editar</button>
        </div>
    </div>

    <script>
    const urlParams = new URLSearchParams(window.location.search);
    window.APP_CONFIG = {
        MODO_ADMIN: urlParams.has('admin');
        VISTA: urlParams.get('vista');
    };
    if (window.APP_CONFIG.MODO_ADMIN) {
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.boton-admin').forEach(boton => {
                boton.classList.remove('boton-admin');
            });
        });
    }
    </script>

    <script src="js/common.js" defer></script>
    <script src="js/perro.js" defer></script>
</body>
</html>
